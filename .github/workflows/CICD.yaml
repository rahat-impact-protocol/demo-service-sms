name: CICD

on:
  workflow_dispatch:

env:
  IMAGE_NAME: esatya/sms-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      # pnpm setup (correct way)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      # install dependencies
      - name: pnpm install
        run: pnpm install

      - name: pnpm build
        run: pnpm build

      # Vault secrets
      - name: Import secrets from vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/docker/rumsan username | DOCKERHUB_USERNAME ;
            github/data/general/docker/rumsan password | DOCKERHUB_TOKEN ;

      # Docker login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.vault.outputs.DOCKERHUB_USERNAME }}
          password: ${{ steps.vault.outputs.DOCKERHUB_TOKEN }}

      # Buildx
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push image
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.sms
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}